<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Scorpion English Academy</title>
<style>
  html,body{height:100%;margin:0;}
  body{
    background:#121212; color:#F8FAFC; font-family:'Cairo',sans-serif;
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:24px; box-sizing:border-box;
  }
  .box{max-width:420px;}
  .emoji{font-size:64px; margin-bottom:16px;}
  h1{font-size:22px; margin:0 0 10px; color:#D4A017;}
  p{color:#94A3B8; font-size:15px; line-height:1.6; margin:0 0 22px;}
  button{
    background:#D4A017; color:#121212; border:none; border-radius:10px;
    padding:12px 24px; font-weight:700; font-size:15px; cursor:pointer;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">🦂</div>
    <h1>You're offline</h1>
    <p>Scorpion English Academy needs an internet connection for this page. Please check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
